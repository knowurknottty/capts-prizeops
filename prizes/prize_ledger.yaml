# CAPT Prize Operations — Master Ledger
# Version: v0.1
# Schema: Each entry is a prize/program that CAPT can target.
# Qualitative fields (capts_fit, reality) are assessments, not evidence.
# Quantitative fields (amount_usd, total_fund_usd) are researched but
# should be verified against current prize terms before submission.

